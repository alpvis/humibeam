name: HumibeamiOS
options:
  bundleIdPrefix: app.humibeam
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "2.1"
    CURRENT_PROJECT_VERSION: "5"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: 1.13.0
  swift-nio-ssh:
    url: https://github.com/apple/swift-nio-ssh.git
    from: 0.13.0
  swift-nio:
    url: https://github.com/apple/swift-nio.git
    from: 2.60.0
  swift-crypto:
    url: https://github.com/apple/swift-crypto.git
    from: 3.0.0

targets:
  HumibeamiOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Shared
      # Geteilter, plattformneutraler Kern aus der Mac-App:
      - path: ../HumibeamMac/SSH
      - path: ../HumibeamMac/Terminal/ClaudeApproval.swift
      - path: ../HumibeamMac/Terminal/GitDiffService.swift
      - path: ../HumibeamMac/Terminal/ClaudeBridge.swift
      - path: ../HumibeamMac/Terminal/CommandHistoryStore.swift
      - path: ../HumibeamMac/Terminal/ClaudeActivity.swift
      - path: ../HumibeamMac/Services/LLMCore.swift
      - path: ../HumibeamMac/Services/MacPairing.swift
      - path: ../HumibeamMac/Beam/BeamProtocol.swift
      - path: ../HumibeamMac/Hosts/HostStore.swift
      - path: ../HumibeamMac/Hosts/SnippetStore.swift
      - path: ../HumibeamMac/Hosts/BookmarkStore.swift
      - path: ../HumibeamMac/App/ServerHealth.swift
      - path: ../HumibeamMac/Services/AccountSync
      - path: ../HumibeamMac/Services/KeychainService.swift
      - path: ../HumibeamMac/Services/AppSupportPaths.swift
      - path: ../HumibeamMac/Services/NetworkMonitor.swift
      - path: Resources
        buildPhase: resources
    info:
      path: App-Info.plist
      properties:
        CFBundleDisplayName: Humibeam
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "Humibeam verbindet sich per SSH mit Servern, auch in deinem lokalen Netzwerk."
        NSPhotoLibraryUsageDescription: "Bilder aus der Fotobibliothek können in die Remote-Session hochgeladen werden."
        NSMicrophoneUsageDescription: "Sprach-Diktat: Aufnahmen werden transkribiert und als Text ins Terminal getippt."
        NSSpeechRecognitionUsageDescription: "Lokales Sprach-Diktat: Apple-Spracherkennung wandelt deine Aufnahme auf dem Gerät in Text um."
        NSFaceIDUsageDescription: "Schützt den Zugriff auf deine Server-Verbindungen."
        NSCameraUsageDescription: "Zum Koppeln mit deinem Mac wird dessen QR-Code gescannt."
        NSSupportsLiveActivities: true
        NSUserActivityTypes: [app.humibeam.session]
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
        UISupportedInterfaceOrientations~ipad: [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.humibeam.ios
        PRODUCT_NAME: Humibeam
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: DC289RNL2G
        CODE_SIGN_ENTITLEMENTS: Humibeam.entitlements
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
      - package: swift-nio-ssh
        product: NIOSSH
      - package: swift-nio
        product: NIOCore
      - package: swift-nio
        product: NIOPosix
      - package: swift-crypto
        product: Crypto
      - target: HumibeamWidgets
      - target: HumibeamWatch

  # Apple-Watch-App: Freigaben beantworten + Server-Ampel (WatchConnectivity).
  HumibeamWatch:
    type: application
    platform: watchOS
    sources:
      - path: Watch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.humibeam.ios.watchkitapp
        PRODUCT_NAME: HumibeamWatch
        DEVELOPMENT_TEAM: DC289RNL2G
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: app.humibeam.ios
        INFOPLIST_KEY_CFBundleDisplayName: Humibeam

  # Widget + Live Activity (Dynamic Island): liest den StatusSnapshot aus der App-Group.
  HumibeamWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.humibeam.ios.widgets
        PRODUCT_NAME: HumibeamWidgets
        DEVELOPMENT_TEAM: DC289RNL2G
        CODE_SIGN_ENTITLEMENTS: Widgets/HumibeamWidgets.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Widgets/Info.plist
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) WIDGET_EXTENSION"
        SKIP_INSTALL: YES
