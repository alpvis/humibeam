name: HumibeamMac
options:
  bundleIdPrefix: app.humibeam
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ONLY_ACTIVE_ARCH: NO
    MARKETING_VERSION: "5.4"
    CURRENT_PROJECT_VERSION: "54"

packages:
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    exactVersion: 0.18.0
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: 1.13.0
  swift-nio-ssh:
    url: https://github.com/apple/swift-nio-ssh.git
    from: 0.13.0
  swift-nio:
    url: https://github.com/apple/swift-nio.git
    from: 2.60.0
  swift-crypto:
    url: https://github.com/apple/swift-crypto.git
    from: 3.0.0
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    from: "120.0.0"

targets:
  HumibeamMac:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Beam
      - path: Features
      - path: Services
      - path: Views
      - path: SSH
      - path: Terminal
      - path: Hosts
      - path: Resources
        buildPhase: resources
        excludes:
          - AppIcon.icns
          - Info.plist
          - HumibeamMac.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.humibeam.mac
        PRODUCT_NAME: Humibeam
        INFOPLIST_FILE: Resources/Info.plist
        INFOPLIST_KEY_CFBundleShortVersionString: $(MARKETING_VERSION)
        INFOPLIST_KEY_CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CODE_SIGN_ENTITLEMENTS: Resources/HumibeamMac.entitlements
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: ArgmaxOSS
        product: WhisperKit
      - package: SwiftTerm
        product: SwiftTerm
      - package: swift-nio-ssh
        product: NIOSSH
      - package: swift-nio
        product: NIOCore
      - package: swift-nio
        product: NIOPosix
      - package: swift-crypto
        product: Crypto
    entitlements:
      path: Resources/HumibeamMac.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true

  HumibeamSupport:
    type: application
    platform: macOS
    sources:
      - path: ../HumibeamSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.humibeam.support
        PRODUCT_NAME: Humibeam Support
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Humibeam Support
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: ../HumibeamSupport/HumibeamSupport.entitlements
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - package: WebRTC
        product: WebRTC
